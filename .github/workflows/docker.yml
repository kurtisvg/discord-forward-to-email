name: docker

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  pull_request:
    branches: [main]
    paths: [Dockerfile]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t fwd2email:test .
      - name: Verify container runs
        run: |
          output=$(docker run --rm fwd2email:test 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "required config is not set"
